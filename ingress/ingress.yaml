apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: your-domain.com  # Replace with your domain or use localhost for local testing
    http:
      paths:
      - path: /             # Frontend accessible at "/"
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api          # API gateway accessible at "/api"
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
